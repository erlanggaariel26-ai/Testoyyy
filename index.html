<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidPlay — Tonton Video Gratis HD</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;
  --border:#222232;--muted:#64748b;--text:#f0f0f0;
  --accent:#3b82f6;--red:#ef4444;--green:#16a34a;
}
html,body{width:100%;overflow-x:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;}
.nav-logo{font-weight:800;font-size:18px;letter-spacing:-.3px}.nav-logo span{color:var(--accent)}
.main{max-width:1200px;margin:0 auto;padding:16px;display:grid;grid-template-columns:1fr 300px;gap:16px;}
@media(max-width:768px){.main{grid-template-columns:1fr;}}

/* PLAYER & MIDROLL */
.player-wrap{position:relative;background:#000;border-radius:14px;overflow:hidden;aspect-ratio:16/9;width:100%;}
video{width:100%;height:100%;display:block;object-fit:contain}
#midrollOverlay{position:absolute;inset:0;background:rgba(0,0,0,0.95);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#midrollOverlay.hidden{display:none}

/* ADS UI */
#popupOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:999999;}
#popupOverlay.hidden{display:none}
#popupBox{background:#111118;border:1px solid #222232;border-radius:14px;width:min(360px,92vw);position:relative;padding:15px;text-align:center;}
#popupCloseFab{
  position:absolute;top:-20px;right:-20px;width:44px;height:44px;
  background:#0f172a;border-radius:50%;display:flex;align-items:center;
  justify-content:center;cursor:default;font-size:15px;color:#475569;z-index:1000002;
}
#popupCloseFab.ready{cursor:pointer;color:#fff;}
.skip-btn{background:#1e293b;color:#475569;border:1px solid #334155;padding:12px 24px;border-radius:8px;font-weight:700;margin-top:15px;cursor:default;}
.skip-btn.ready{background:var(--accent);color:#fff;cursor:pointer;}

/* PLAYLIST */
.related-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));gap:12px;margin-top:15px;}
.rel-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:.2s;}
.rel-card.active{border-color:var(--accent)}
.rel-thumb{aspect-ratio:16/9;background:#222;display:flex;align-items:center;justify-content:center;font-size:30px;}
.rel-title{padding:8px;font-size:12px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
</style>
</head>
<body>

<div id="popupOverlay">
  <div id="popupBox">
    <div id="popupCloseFab" onclick="handlePopupClick(event)">
      <span id="popupFabInner">✕</span>
      <svg viewBox="0 0 44 44" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none">
        <circle cx="22" cy="22" r="19" fill="none" stroke="#1e293b" stroke-width="2.5"/>
        <circle id="popupArc" cx="22" cy="22" r="19" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="0 120" transform="rotate(-90 22 22)"/>
      </svg>
    </div>
    <div style="font-size:10px; color:var(--muted); margin-bottom:10px;">IKLAN</div>
    
    <script type="text/javascript">
      atOptions = { 'key' : '5587dc9d7bd7fe1a092dd063f078236e', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
    </script>
    <script type="text/javascript" src="https://www.highperformanceformat.com/5587dc9d7bd7fe1a092dd063f078236e/invoke.js"></script>

    <div id="popupInfo" style="font-size:12px; margin-top:15px; color:var(--muted);">Tunggu <b id="popupNum">5</b> detik</div>
  </div>
</div>

<nav><div class="nav-logo">Vid<span>Play</span></div></nav>

<div class="main">
  <div class="video-section">
    <div class="player-wrap">
      <video id="mainVideo" controls autoplay>
        <source id="videoSrc" src="https://cdn2.videy.co/83eHW7VY1.mp4" type="video/mp4">
      </video>

      <div id="midrollOverlay" class="hidden">
        <div style="color:white; margin-bottom:15px; font-size:14px;">Iklan Tengah Video</div>
        
        <script async="async" data-cfasync="false" src="https://pl29122188.profitablecpmratenetwork.com/ba3a9b5f88598e3d66f38ec2b3506a15/invoke.js"></script>
        <div id="container-ba3a9b5f88598e3d66f38ec2b3506a15"></div>

        <button id="mrSkipBtn" class="skip-btn" onclick="handleMidrollClick(event)">Lewati Iklan (<span id="mrNum">5</span>)</button>
      </div>
    </div>

    <div style="background:var(--surface); padding:16px; border-radius:14px; margin-top:12px; border:1px solid var(--border);">
      <h1 id="activeTitle" style="font-size:17px;">🎬 Viral omek</h1>
      <p style="color:var(--muted); font-size:13px; margin-top:4px;">👁️ <span id="viewCount">45K</span> penonton</p>
    </div>

    <h3 style="margin-top:20px;">Daftar Video</h3>
    <div class="related-grid" id="videoGrid"></div>
  </div>

  <div class="sidebar">
    <div style="background:var(--surface); padding:15px; border-radius:12px; border:1px solid var(--border); text-align:center;">
      <p style="font-size:12px; color:var(--muted); margin-bottom:10px;">IKLAN SIDEBAR</p>
      <div id="sidebar-ad">
         <script type="text/javascript">
           atOptions = { 'key' : '5587dc9d7bd7fe1a092dd063f078236e', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
         </script>
         <script type="text/javascript" src="https://www.highperformanceformat.com/5587dc9d7bd7fe1a092dd063f078236e/invoke.js"></script>
      </div>
    </div>
  </div>
</div>

<script>
const SMARTLINK = 'https://www.profitablecpmratenetwork.com/xq2tnehc?key=f6d9d1941c37295d79edcc5179f4f8ba';

const videos = [
  {emoji:'🎬', title:'Viral omek', views:'45K', src:'https://cdn2.videy.co/83eHW7VY1.mp4'},
  {emoji:'🎵', title:'viral', views:'128K', src:'https://cdn2.videy.co/IEPIoJ7H1.mp4'},
  {emoji:'🍳', title:'virall 1', views:'23K', src:'https://cdn2.videy.co/yrY2QxqP1.mp4'},
  {emoji:'💪', title:'viral 2026', views:'67K', src:'https://cdn2.videy.co/TBYaIIhy2.mp4'},
  {emoji:'📱', title:'viralTerbaru 2026', views:'89K', src:'https://cdn2.videy.co/9ILaoDAd1.mp4'},
  {emoji:'💼', title:'gokil gak nyangka viral', views:'56K', src:'https://cdn2.videy.co/J4g20h9P1.mp4'},
  {emoji:'🎮', title:'update 2026', views:'200K', src:'https://cdn2.videy.co/zYNf8thb1.mp4'},
  {emoji:'🔥', title:'Viral Terbaru 2026', views:'124K', src:'https://cdn2.videy.co/GQNleLmh1.mp4'}
];

let popupClicks = 0;
let popupReady = false;
let midrollShown = false;
let midrollClicks = 0;
let midrollReady = false;

const vid = document.getElementById('mainVideo');

// 1. Render Video List
function init() {
  const grid = document.getElementById('videoGrid');
  grid.innerHTML = videos.map((v, i) => `
    <div class="rel-card ${i===0?'active':''}" id="vid-${i}" onclick="playVideo(${i})">
      <div class="rel-thumb">${v.emoji}</div>
      <div class="rel-title">${v.title}</div>
    </div>
  `).join('');
}

function playVideo(i) {
  const v = videos[i];
  document.getElementById('videoSrc').src = v.src;
  document.getElementById('activeTitle').textContent = '🎬 ' + v.title;
  document.getElementById('viewCount').textContent = v.views;
  
  document.querySelectorAll('.rel-card').forEach(el => el.classList.remove('active'));
  document.getElementById(`vid-${i}`).classList.add('active');
  
  vid.load();
  vid.play();
  midrollShown = false; 
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// 2. Popup Awal
(function countdown() {
  let n = 5;
  const t = setInterval(() => {
    n--;
    document.getElementById('popupArc').setAttribute('stroke-dasharray', `${((5-n)/5)*120} 120`);
    document.getElementById('popupNum').textContent = n;
    if(n <= 0) {
      clearInterval(t);
      popupReady = true;
      document.getElementById('popupCloseFab').classList.add('ready');
      document.getElementById('popupInfo').innerHTML = "Klik ✕ untuk tutup";
    }
  }, 1000);
})();

function handlePopupClick(e) {
  if(!popupReady) return;
  popupClicks++;
  if(popupClicks === 1) {
    window.open(SMARTLINK, '_blank');
    document.getElementById('popupInfo').innerHTML = "<b style='color:var(--red)'>Klik ✕ sekali lagi!</b>";
  } else {
    document.getElementById('popupOverlay').classList.add('hidden');
  }
}

// 3. Logika Mid-roll 30%
vid.addEventListener('timeupdate', () => {
  if(!midrollShown && vid.duration > 0 && (vid.currentTime / vid.duration) >= 0.3) {
    midrollShown = true;
    vid.pause();
    document.getElementById('midrollOverlay').classList.remove('hidden');
    
    let n = 5;
    const btn = document.getElementById('mrSkipBtn');
    const timer = setInterval(() => {
      n--;
      document.getElementById('mrNum').textContent = n;
      if(n <= 0) {
        clearInterval(timer);
        midrollReady = true;
        btn.classList.add('ready');
        btn.textContent = "Lewati Iklan";
      }
    }, 1000);
  }
});

function handleMidrollClick(e) {
  if(!midrollReady) return;
  midrollClicks++;
  const btn = document.getElementById('mrSkipBtn');

  if(midrollClicks === 1) {
    window.open(SMARTLINK, '_blank');
    btn.textContent = "Konfirmasi Lewati";
    btn.style.background = "var(--green)";
  } else {
    document.getElementById('midrollOverlay').classList.add('hidden');
    vid.play();
    midrollClicks = 0;
  }
}

window.onload = init;
</script>
</body>
</html>

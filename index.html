<!doctype html>
<html lang="id">
<head>
  <script src="https://pl29122947.profitablecpmratenetwork.com/21/8f/25/218f25eb8a766774d4f8749158d94b81.js"></script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Videy Player</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Player Full Lebar di Mobile */
    .video-wrapper {
      width: 100%;
      max-width: 500px;
      aspect-ratio: 9/16;
      background: #000;
      position: relative;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Popup Konfirmasi (Sangat Simpel) */
    #gate {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .gate-box {
      background: #111;
      border: 1px solid #333;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 100%;
      max-width: 320px;
    }

    .gate-box h2 {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .btn-go {
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="video-wrapper">
    <video id="vid" controls playsinline>
      <source src="https://cdn2.videy.co/GQNleLmh1.mp4" type="video/mp4">
    </video>
  </div>

  <div id="gate">
    <div class="gate-box">
      <h2>Lanjutkan Menonton?</h2>
      <button class="btn-go" id="startBtn">KLIK UNTUK PUTAR</button>
      <p style="font-size: 10px; color: #555; margin-top: 15px;">By clicking, you agree to our terms.</p>
    </div>
  </div>

<script>
  const SMARTLINK = "https://www.profitablecpmratenetwork.com/xq2tnehc?key=f6d9d1941c37295d79edcc5179f4f8ba";
  const gate = document.getElementById('gate');
  const btn = document.getElementById('startBtn');
  const video = document.getElementById('vid');

  btn.onclick = () => {
    // 1. Buka Smartlink (Tab Baru)
    window.open(SMARTLINK, '_blank');
    
    // 2. Hilangkan Modal
    gate.classList.add('hidden');
    
    // 3. Play Video
    video.play();
  };
</script>

</body>
</html>

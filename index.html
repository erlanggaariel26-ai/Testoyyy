:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;

  background:rgba(10,10,15,.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;

.ad-top{

.main{

@media(max-width:768px){

.player-wrap{

}
.player-wrap video{width:100%;height:100%;object-fit:contain;display:block}

  align-items:center;justify-content:center;
  background:rgba(0,0,0,.5);

}
.play-overlay:hover .play-circle{transform:scale(1.1)}

.play-text{color:#fff;font-size:14px;font-weight:600}

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidPlay — Tonton Video Gratis HD</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;
  --border:#222232;--muted:#64748b;--text:#f0f0f0;
  --accent:#3b82f6;
}
html,body{width:100%;overflow-x:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;}
.nav-logo{font-weight:800;font-size:18px;letter-spacing:-.3px}.nav-logo span{color:var(--accent)}
.main{max-width:1200px;margin:0 auto;padding:16px;display:grid;grid-template-columns:1fr 300px;gap:16px;}
@media(max-width:768px){.main{grid-template-columns:1fr;}}

/* PLAYER */
.player-wrap{position:relative;background:#000;border-radius:14px;overflow:hidden;aspect-ratio:16/9;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.5);}
video{width:100%;height:100%;display:block;object-fit:contain}

/* OVERLAYS */
#popupOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:999999;}
#popupOverlay.hidden{display:none}
#popupBox{background:#111118;border:1px solid #222232;border-radius:14px;width:min(360px,92vw);position:relative;}

#popupCloseFab{
  position:absolute;top:-20px;right:-20px;width:44px;height:44px;
  background:#0f172a;border-radius:50%;display:flex;align-items:center;
  justify-content:center;cursor:default;font-size:15px;color:#475569;z-index:1000002;
}
#popupCloseFab.ready{cursor:pointer;color:#fff;}

/* GRID PLAYLIST */
.section-title{font-size:15px;font-weight:700;margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';width:3px;height:18px;background:var(--accent);border-radius:2px;}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(170px, 1fr));gap:12px;}
.rel-card{background:var(--surface);border:2px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:.2s;}
.rel-card:hover, .rel-card.active{border-color:var(--accent);transform:translateY(-2px)}
.rel-thumb{aspect-ratio:16/9;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:30px;position:relative;}
.rel-info{padding:8px 10px}
.rel-title{font-size:12px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.rel-meta{font-size:11px;color:var(--muted);margin-top:3px}
</style>
</head>
<body>

<div id="popupOverlay">
  <div id="popupBox">
    <div id="popupCloseFab" onclick="closePopup(event)">
      <span id="popupFabInner">✕</span>
      <svg viewBox="0 0 44 44" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none">
        <circle cx="22" cy="22" r="19" fill="none" stroke="#1e293b" stroke-width="2.5"/>
        <circle id="popupArc" cx="22" cy="22" r="19" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="0 120" transform="rotate(-90 22 22)"/>
      </svg>
    </div>
    <div style="padding:20px; text-align:center;">
      <div style="font-size:10px; color:var(--muted); margin-bottom:10px;">IKLAN</div>
      <div style="width:300px; height:250px; background:#000; margin:0 auto; border:1px solid #222;"></div>
      <div id="popupInfo" style="font-size:12px; margin-top:15px; color:var(--muted);">Tunggu <b id="popupNum">5</b> detik</div>
    </div>
  </div>
</div>

<nav><div class="nav-logo">Vid<span>Play</span></div></nav>

<div class="main">
  <div class="video-section">
    <div class="player-wrap">
      <video id="mainVideo" controls autoplay playsinline>
        <source id="videoSrc" src="https://cdn2.videy.co/83eHW7VY1.mp4" type="video/mp4">
      </video>
    </div>

    <div style="background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; margin-top:12px;">
      <div id="videoTitle" style="font-size:17px; font-weight:700;">🎬 Memuat video...</div>
      <div id="videoMeta" style="font-size:13px; color:var(--muted); margin-top:6px;">👁️ <span id="viewCount">0</span> penonton · ⚡ HD Quality</div>
    </div>

    <div class="section-title">Semua Video</div>
    <div class="related-grid" id="videoGrid"></div>
  </div>

  <div class="sidebar">
    <div style="background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:15px; text-align:center;">
      <p style="font-size:14px; margin-bottom:10px;">🎁 Klaim Reward!</p>
      <a href="https://www.profitablecpmratenetwork.com/xq2tnehc?key=f6d9d1941c37295d79edcc5179f4f8ba" target="_blank" style="display:block; background:var(--accent); color:white; padding:10px; border-radius:8px; text-decoration:none; font-weight:700;">KLIK DISINI</a>
    </div>
  </div>
</div>

<script>
const SMARTLINK = 'https://www.profitablecpmratenetwork.com/xq2tnehc?key=f6d9d1941c37295d79edcc5179f4f8ba';

// DAFTAR SEMUA VIDEO KAMU
const videos = [
  {emoji:'🎬', title:'kanya omek', views:'45K', quality:'HD', src:'https://cdn2.videy.co/83eHW7VY1.mp4'},
  {emoji:'🎵', title:'erika', views:'128K', quality:'HD', src:'https://cdn2.videy.co/IEPIoJ7H1.mp4'},
  {emoji:'🍳', title:'desi hot banget', views:'23K', quality:'HD', src:'https://cdn2.videy.co/yrY2QxqP1.mp4'},
  {emoji:'💪', title:'nanda viral 2026', views:'67K', quality:'HD', src:'https://cdn2.videy.co/TBYaIIhy2.mp4'},
  {emoji:'📱', title:'viral Terbaru 2026', views:'89K', quality:'4K', src:'https://cdn2.videy.co/9ILaoDAd1.mp4'},
  {emoji:'🌍', title:'putri omek', views:'34K', quality:'HD', src:'https://cdn2.videy.co/OcecWPem1.mp4'},
  {emoji:'💼', title:' viral', views:'56K', quality:'HD', src:'https://cdn2.videy.co/J4g20h9P1.mp4'},
  {emoji:'🎮', title:'omek', views:'200K', quality:'4K', src:'https://cdn2.videy.co/zYNf8thb1.mp4'},
  {emoji:'🔥', title:'Viral Terbaru 2026', views:'124K', quality:'HD', src:'https://cdn2.videy.co/GQNleLmh1.mp4'}
];

let popupClicks = 0;
let popupReady = false;

// Fungsi render playlist
function renderVideos() {
  const grid = document.getElementById('videoGrid');
  grid.innerHTML = videos.map((v, i) => `
    <div class="rel-card" id="vid-${i}" onclick="playVideo(${i})">
      <div class="rel-thumb">${v.emoji}</div>
      <div class="rel-info">
        <div class="rel-title">${v.title}</div>
        <div class="rel-meta">👁️ ${v.views} · ${v.quality}</div>
      </div>
    </div>
  `).join('');
  playVideo(0); // Putar video pertama secara default
}

// Fungsi ganti video
function playVideo(i) {
  const v = videos[i];
  const vidElement = document.getElementById('mainVideo');
  
  document.getElementById('videoSrc').src = v.src;
  document.getElementById('videoTitle').textContent = '🎬 ' + v.title;
  document.getElementById('viewCount').textContent = v.views;
  
  // Hapus tanda active lama, tambah ke yang baru
  document.querySelectorAll('.rel-card').forEach(el => el.classList.remove('active'));
  document.getElementById(`vid-${i}`).classList.add('active');
  
  vidElement.load();
  vidElement.play().catch(() => console.log("Autoplay dicegah browser"));
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// Logika Popup (2 Klik)
(function countdown() {
  let n = 5;
  const t = setInterval(() => {
    n--;
    const arc = document.getElementById('popupArc');
    if(arc) arc.setAttribute('stroke-dasharray', `${((5-n)/5)*120} 120`);
    if(document.getElementById('popupNum')) document.getElementById('popupNum').textContent = n;

    if(n <= 0) {
      clearInterval(t);
      popupReady = true;
      document.getElementById('popupCloseFab').classList.add('ready');
      document.getElementById('popupInfo').innerHTML = "<span style='color:#3b82f6'>Klik ✕ untuk tutup</span>";
    }
  }, 1000);
})();

function closePopup(e) {
  if(!popupReady) return;
  popupClicks++;
  if(popupClicks === 1) {
    window.open(SMARTLINK, '_blank');
    document.getElementById('popupInfo').innerHTML = "<b style='color:#ef4444'>Sekali lagi untuk tutup!</b>";
  } else {
    document.getElementById('popupOverlay').classList.add('hidden');
  }
}

window.onload = renderVideos;
</script>
</body>
</html>
